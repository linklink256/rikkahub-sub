# RikkaHub Sub — Debug + Release APK Build
#
# Triggered on:
#   - Push to master branch
#   - Manual trigger via GitHub Actions UI (workflow_dispatch)
#
# Builds both debug and release APKs with ABI splits (arm64-v8a, x86_64, universal)
# and uploads them as build artifacts (retention: 30 days).
#
# Debug signing uses Android SDK's default debug keystore.
# Release signing uses the fork keystore bundled in the repo (app/keystore/subagent-fork.keystore).

name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (debug + release)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload debug APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rikkahub-sub-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload release APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rikkahub-sub-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
