name: Build Fork APK

on:
  push:
    branches: [master, main, fix/skills-use-skill-only, feat/system-asr, feat/voice-call]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        variant: [Debug, Release]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assemble${{ matrix.variant }} --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rikkahub-sub-${{ matrix.variant == 'Debug' && 'debug' || 'release' }}
          path: app/build/outputs/apk/${{ matrix.variant == 'Debug' && 'debug' || 'release' }}/*.apk
